<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Highlight overlay</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        background: transparent !important;
        color-scheme: light;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent !important;
        pointer-events: none;
      }
      /* Prefer outline + minimal fill so the desktop shows through even if alpha is flattened. */
      .highlight {
        width: 100%;
        height: 100%;
        background: rgba(59, 130, 246, 0.08);
        border: 2px solid rgba(59, 130, 246, 0.9);
        border-radius: 4px;
        box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.15) inset;
        animation: highlight-fade-in 0.12s ease-out;
      }
      @keyframes highlight-fade-in {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div class="highlight" aria-hidden="true"></div>
  </body>
</html>
